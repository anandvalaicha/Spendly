{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update what you spent</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense_id) }}">
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" step="0.01" min="0.01"
                           placeholder="0.00" value="{{ amount }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        {% for option in categories %}
                        <option value="{{ option }}"
                                {% if option == category %}selected{% endif %}>{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input" value="{{ date }}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description <span class="form-optional">(optional)</span></label>
                    <input type="text" id="description" name="description"
                           class="form-input" maxlength="200"
                           placeholder="e.g. Lunch with friends" value="{{ description }}">
                </div>
                <button type="submit" class="btn-submit">Save Changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">Cancel</a>
        </p>

    </div>
</section>

{% endblock %}
